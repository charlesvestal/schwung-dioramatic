<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dioramatic</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0a1a; color: #c0c0d0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
h1 { font-size: 24px; font-weight: 300; letter-spacing: 4px; margin-bottom: 4px; color: #e0e0f0; }
.subtitle { font-size: 12px; color: #606080; margin-bottom: 20px; letter-spacing: 2px; }
.source-section { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; justify-content: center; }
button { background: #1a1a3a; color: #a0a0d0; border: 1px solid #2a2a5a; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; letter-spacing: 1px; }
button:hover { background: #2a2a5a; }
button.active { background: #3030a0; border-color: #5050c0; color: #fff; }
.file-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; justify-content: center; flex-wrap: wrap; }
.file-row label { background: #1a1a3a; color: #a0a0d0; border: 1px solid #2a2a5a; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; letter-spacing: 1px; }
.file-row label:hover { background: #2a2a5a; }
.file-row input[type=file] { display: none; }
#file-name { font-size: 11px; color: #606080; }
.meter { width: 100%; max-width: 640px; height: 4px; background: #1a1a3a; border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
.meter-fill { height: 100%; background: linear-gradient(90deg, #3040a0, #6060c0, #a060c0); width: 0%; transition: width 50ms; }
.controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 640px; width: 100%; margin-bottom: 16px; }
@media (max-width: 500px) { .controls { grid-template-columns: repeat(2, 1fr); } }
.knob { background: #12122a; border-radius: 10px; padding: 14px 10px; text-align: center; border: 1px solid #1a1a3a; }
.knob label { display: block; font-size: 10px; letter-spacing: 1.5px; color: #8080a0; margin-bottom: 2px; text-transform: uppercase; }
.knob .hint { display: block; font-size: 8px; color: #7070a0; margin-bottom: 6px; letter-spacing: 0.5px; }
.knob input[type=range] { width: 100%; -webkit-appearance: none; height: 6px; border-radius: 3px; background: #1a1a3a; outline: none; }
.knob input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #6060c0; cursor: pointer; border: 2px solid #8080e0; }
.knob .value { font-size: 16px; color: #a0a0d0; margin-top: 4px; font-variant-numeric: tabular-nums; }
.status { font-size: 11px; color: #8080a0; margin-top: 4px; }
button:focus-visible, input:focus-visible { outline: 2px solid #8080e0; outline-offset: 2px; }
</style>
</head>
<body>

<h1>DIORAMATIC</h1>
<div class="subtitle">GRANULAR SHIMMER</div>

<div class="source-section">
  <button id="btn-mic" onclick="startMic()">Mic</button>
  <button id="btn-tone" onclick="startTone()">Tone</button>
  <button id="btn-chord" onclick="startChord()">Chord</button>
  <button id="btn-piano" onclick="startBuiltin('audio/piano.wav','Piano')">Piano</button>
  <button id="btn-arp" onclick="startBuiltin('audio/arp.wav','Arp')">Arp</button>
  <button id="btn-stop" onclick="stopAudio()">Stop</button>
</div>

<div class="file-row">
  <label for="file-input">Load Audio File</label>
  <input type="file" id="file-input" accept="audio/*" onchange="loadFile(event)">
  <span id="file-name"></span>
</div>

<div class="meter"><div class="meter-fill" id="meter"></div></div>

<div class="controls">
  <div class="knob"><label>Space</label><span class="hint">room &rarr; cathedral</span><input type="range" id="k-space" min="0" max="100" value="55"><div class="value" id="v-space">55</div></div>
  <div class="knob"><label>Shimmer</label><span class="hint">natural &rarr; crystal</span><input type="range" id="k-shimmer" min="0" max="100" value="35"><div class="value" id="v-shimmer">35</div></div>
  <div class="knob"><label>Smear</label><span class="hint">sharp &rarr; dissolved</span><input type="range" id="k-smear" min="0" max="100" value="40"><div class="value" id="v-smear">40</div></div>
  <div class="knob"><label>Warmth</label><span class="hint">airy &rarr; amber</span><input type="range" id="k-warmth" min="0" max="100" value="45"><div class="value" id="v-warmth">45</div></div>
  <div class="knob"><label>Drift</label><span class="hint">still &rarr; breathing</span><input type="range" id="k-drift" min="0" max="100" value="35"><div class="value" id="v-drift">35</div></div>
  <div class="knob"><label>Sustain</label><span class="hint">short &rarr; infinite</span><input type="range" id="k-sustain" min="0" max="100" value="50"><div class="value" id="v-sustain">50</div></div>
  <div class="knob"><label>Scatter</label><span class="hint">focused &rarr; wide</span><input type="range" id="k-scatter" min="0" max="100" value="40"><div class="value" id="v-scatter">40</div></div>
  <div class="knob"><label>Mix</label><span class="hint">dry &rarr; wet</span><input type="range" id="k-mix" min="0" max="100" value="60"><div class="value" id="v-mix">60</div></div>
</div>

<div class="status" id="status" role="status" aria-live="polite">Click a source to begin</div>

<script>
const processorCode = `
class DioramaticProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this.sr = sampleRate;

    // Musical params (0-1)
    this.space = 0.55; this.shimmer = 0.35; this.smear = 0.4; this.warmth = 0.45;
    this.drift = 0.35; this.sustain = 0.5; this.scatter = 0.4; this.mix = 0.6;

    // Capture buffer
    this.capSize = Math.floor(this.sr * 2);
    this.capL = new Float32Array(this.capSize);
    this.capR = new Float32Array(this.capSize);
    this.capPos = 0;

    // Grains
    this.maxGrains = 32;
    this.grains = [];
    for (let i = 0; i < this.maxGrains; i++) {
      this.grains.push({active:false,start:0,len:0,pos:0,speed:1,amp:0,
        envInc:0,envPhase:0,panL:0.5,panR:0.5,detune:1});
    }
    this.cloudTimer = 0;
    this.shimmerGrainTimer = 0;
    this.envFollower = 0;
    this.envFollowerSlow = 0;

    // FDN Reverb
    this.fdnSize = 8192;
    this.fdnLines = [new Float32Array(this.fdnSize),new Float32Array(this.fdnSize),
                     new Float32Array(this.fdnSize),new Float32Array(this.fdnSize)];
    this.fdnPos = [0,0,0,0];
    this.fdnLP = [0,0,0,0];
    this.fdnMod = [0,0,0,0];

    // Allpass diffusers
    this.apLens = [241,173,419,313];
    this.apBufs = this.apLens.map(l => new Float32Array(l));
    this.apPos = [0,0,0,0];

    // Shimmer pitch shift buffer
    this.shimBuf = new Float32Array(4096);
    this.shimWr = 0; this.shimRd = 0;

    // SVF filter
    this.svfL = {ic1:0,ic2:0}; this.svfR = {ic1:0,ic2:0};

    // Pitch mod LFO
    this.lfoPhase = 0;

    // Output smoothing — catches pops/clicks
    this.prevOutL = 0; this.prevOutR = 0;
    this.dcL = 0; this.dcR = 0;

    // RNG
    this.rngState = 12345;
    this.peakLevel = 0; this.meterCounter = 0;

    this.port.onmessage = (e) => {
      const p = e.data;
      for (const k of ['space','shimmer','smear','warmth','drift','sustain','scatter','mix']) {
        if (p[k] !== undefined) this[k] = p[k];
      }
    };
  }

  rng() { this.rngState = (this.rngState * 1664525 + 1013904223) & 0xFFFFFFFF; return (this.rngState >>> 8) / 16777216; }
  hann(p) { return 0.5 * (1 - Math.cos(2 * Math.PI * p)); }

  triggerGrain(speed, amp, lenMs, panWidth) {
    for (let g of this.grains) {
      if (!g.active) {
        const len = Math.max(44, Math.floor(this.sr * lenMs / 1000));
        const recent = Math.floor(this.sr * 0.05 + this.rng() * this.sr * 0.4);
        g.active = true;
        g.start = (this.capPos - recent + this.capSize) % this.capSize;
        g.len = len; g.pos = 0; g.speed = speed; g.amp = amp;
        g.envPhase = 0; g.envInc = 1 / len;
        g.detune = 1 + (this.rng() - 0.5) * 0.009;
        // Pan with scatter — use equal power, limited range to avoid pops
        const panPos = (this.rng() - 0.5) * panWidth * 0.7;
        g.panL = Math.sqrt(0.5 - panPos * 0.5);
        g.panR = Math.sqrt(0.5 + panPos * 0.5);
        // Ensure minimum grain length for short sparkles to avoid clicks
        if (g.len < 88) { g.len = 88; g.envInc = 1 / 88; }
        return;
      }
    }
  }

  process(inputs, outputs) {
    const input = inputs[0]; const output = outputs[0];
    if (!input || !input[0]) return true;
    const inL = input[0]; const inR = input[1] || input[0];
    const outL = output[0]; const outR = output[1] || output[0];
    const N = outL.length;

    // === DERIVE DSP PARAMS FROM MUSICAL KNOBS ===

    // Space -> reverb delay line selection + send amount
    // 0=small room, 1=infinite cathedral
    const revSend = 0.2 + this.space * 0.75;
    const fdnLengths = [
      Math.floor(1087 + this.space * 2500),
      Math.floor(1283 + this.space * 2900),
      Math.floor(1447 + this.space * 3400),
      Math.floor(1663 + this.space * 3900)
    ];

    // Shimmer -> octave-up feedback in reverb + bright grain rate
    // 0=natural reverb, 1=cascading crystal harmonics
    const shimFeedback = this.shimmer * 0.12;
    const shimGrainRate = this.shimmer > 0.1 ? Math.floor(8000 / (0.3 + this.shimmer * 4)) : 999999;

    // Smear -> grain cloud density + grain length
    // 0=no grains (sharp attacks), 1=dense cloud (everything dissolves)
    const cloudRate = this.smear > 0.05 ? Math.max(64, Math.floor(6000 / (0.2 + this.smear * 6))) : 999999;
    const cloudLenMs = 15 + this.smear * 80;

    // Warmth -> filter cutoff (inverted: more warmth = lower cutoff)
    // 0=bright/airy, 1=dark/amber
    const cutHz = Math.min(20000, 200 * Math.pow(100, 1 - this.warmth));

    // Drift -> pitch mod depth + reverb line modulation depth
    // 0=still/frozen, 1=constantly evolving
    const pitchModDepth = this.drift * 0.15;
    const pitchModRate = 0.05 + this.drift * 0.4;
    const revModDepth = 4 + this.drift * 20;

    // Sustain -> reverb feedback + grain overlap length
    // 0=short, 1=near-infinite
    const revFeedback = Math.min(0.97, 0.65 + this.sustain * 0.32);
    const sustainGrainLen = 50 + this.sustain * 350;

    // Scatter -> stereo width of grains
    // 0=mono/focused, 1=wide stereo field
    const panWidth = this.scatter;

    // Reverb damping: derived from warmth (warmer = more damping)
    const damping = 0.15 + this.warmth * 0.5;

    // SVF coefficients
    const svfG = Math.tan(Math.PI * Math.min(cutHz, 20000) / this.sr);
    const svfK = 2 - 0.19;
    const svfA1 = 1 / (1 + svfG * (svfG + svfK));
    const svfA2 = svfG * svfA1;
    const svfA3 = svfG * svfA2;

    // LFO
    const lfoInc = pitchModRate / this.sr;

    // Envelope follower — release rate matched to reverb tail
    const tailFactor = (this.sustain + this.space) * 0.5;
    const slowRel = Math.max(0.0001, 0.002 - tailFactor * 0.0018);

    for (let i = 0; i < N; i++) {
      const dryL = inL[i] * 0.7;
      const dryR = inR[i] * 0.7;

      // Capture buffer
      this.capL[this.capPos] = dryL;
      this.capR[this.capPos] = dryR;
      this.capPos = (this.capPos + 1) % this.capSize;

      // Envelope follower
      const inLevel = Math.abs(dryL) + Math.abs(dryR);
      if (inLevel > this.envFollower) this.envFollower += 0.3 * (inLevel - this.envFollower);
      else this.envFollower += 0.005 * (inLevel - this.envFollower);
      if (inLevel > this.envFollowerSlow) this.envFollowerSlow += 0.1 * (inLevel - this.envFollowerSlow);
      else this.envFollowerSlow += slowRel * (inLevel - this.envFollowerSlow);
      const envGate = Math.min(1, this.envFollowerSlow * 5);

      // Pitch mod LFO
      const lfoVal = Math.sin(2 * Math.PI * this.lfoPhase);
      const pitchMod = Math.pow(2, pitchModDepth * lfoVal * (100 / 1200));
      this.lfoPhase += lfoInc;
      if (this.lfoPhase >= 1) this.lfoPhase -= 1;

      // === GRAIN TRIGGERS ===

      // Cloud grains (Smear): time-blurring wash, gated by input level
      this.cloudTimer++;
      if (this.cloudTimer >= cloudRate && envGate > 0.01) {
        this.cloudTimer = 0;
        const sp = this.rng() < 0.85 ? 1 : 2;
        this.triggerGrain(sp, (0.2 + this.sustain * 0.3) * envGate, cloudLenMs + this.rng() * 20, panWidth);
      }

      // Shimmer grains: octave-up sparkle texture, gated by input
      this.shimmerGrainTimer++;
      if (this.shimmerGrainTimer >= shimGrainRate && envGate > 0.01) {
        this.shimmerGrainTimer = 0;
        this.triggerGrain(2, (0.12 + this.shimmer * 0.25) * envGate, sustainGrainLen + this.rng() * 100, panWidth * 0.8);
        if (this.rng() < 0.15 + this.shimmer * 0.3) {
          this.triggerGrain(4, (0.2 + this.shimmer * 0.2) * envGate, 2 + this.rng() * 5, panWidth);
        }
      }

      // === GRAIN PLAYBACK ===
      let wetL = 0, wetR = 0;
      for (let g of this.grains) {
        if (!g.active) continue;
        const idx = Math.floor(g.start + g.pos);
        const frac = (g.start + g.pos) - idx;
        const i0 = ((idx % this.capSize) + this.capSize) % this.capSize;
        const i1 = (i0 + 1) % this.capSize;
        const sL = this.capL[i0] * (1 - frac) + this.capL[i1] * frac;
        const sR = this.capR[i0] * (1 - frac) + this.capR[i1] * frac;
        const env = this.hann(g.envPhase);
        const a = g.amp * env;
        wetL += sL * a * g.panL;
        wetR += sR * a * g.panR;
        g.pos += g.speed * g.detune * pitchMod;
        g.envPhase += g.envInc;
        if (g.envPhase >= 1) g.active = false;
      }

      // === SVF FILTER ===
      let v3 = wetL - this.svfL.ic2;
      let v1 = svfA1 * this.svfL.ic1 + svfA2 * v3;
      let v2 = this.svfL.ic2 + svfA2 * this.svfL.ic1 + svfA3 * v3;
      this.svfL.ic1 = 2 * v1 - this.svfL.ic1;
      this.svfL.ic2 = 2 * v2 - this.svfL.ic2;
      wetL = v2;

      v3 = wetR - this.svfR.ic2;
      v1 = svfA1 * this.svfR.ic1 + svfA2 * v3;
      v2 = this.svfR.ic2 + svfA2 * this.svfR.ic1 + svfA3 * v3;
      this.svfR.ic1 = 2 * v1 - this.svfR.ic1;
      this.svfR.ic2 = 2 * v2 - this.svfR.ic2;
      wetR = v2;

      // === FDN REVERB ===
      if (revSend > 0.01) {
        // Input diffusion
        let diff = (wetL + wetR) * 0.5 * revSend;
        for (let a = 0; a < 4; a++) {
          const del = this.apBufs[a][this.apPos[a]];
          const ao = del - 0.5 * diff;
          this.apBufs[a][this.apPos[a]] = diff + 0.5 * ao;
          diff = ao;
          this.apPos[a] = (this.apPos[a] + 1) % this.apLens[a];
        }

        // Modulated delay line read
        const modRates = [0.37, 0.47, 0.31, 0.53];
        let taps = [0, 0, 0, 0];
        for (let l = 0; l < 4; l++) {
          const mo = Math.sin(2 * Math.PI * this.fdnMod[l]) * revModDepth;
          let d = fdnLengths[l] + Math.floor(mo);
          if (d < 1) d = 1; if (d >= this.fdnSize) d = this.fdnSize - 1;
          taps[l] = this.fdnLines[l][(this.fdnPos[l] - d + this.fdnSize) & (this.fdnSize - 1)];
          this.fdnMod[l] += modRates[l] / this.sr;
          if (this.fdnMod[l] >= 1) this.fdnMod[l] -= 1;
        }

        // Hadamard
        const mx = [
          0.5 * (taps[0] + taps[1] + taps[2] + taps[3]),
          0.5 * (taps[0] - taps[1] + taps[2] - taps[3]),
          0.5 * (taps[0] + taps[1] - taps[2] - taps[3]),
          0.5 * (taps[0] - taps[1] - taps[2] + taps[3])
        ];

        // Shimmer pitch shift
        this.shimBuf[this.shimWr] = (mx[0] + mx[1] + mx[2] + mx[3]) * 0.25;
        this.shimWr = (this.shimWr + 1) & 4095;
        const gs = 1024;
        const rdA = Math.floor(this.shimRd); const frA = this.shimRd - rdA;
        const sA = this.shimBuf[rdA & 4095] * (1 - frA) + this.shimBuf[(rdA + 1) & 4095] * frA;
        const eA = 0.5 * (1 - Math.cos(2 * Math.PI * ((this.shimRd / gs) % 1)));
        const rdB = this.shimRd + gs / 2;
        const rdBi = Math.floor(rdB); const frB = rdB - rdBi;
        const sB = this.shimBuf[rdBi & 4095] * (1 - frB) + this.shimBuf[(rdBi + 1) & 4095] * frB;
        const eB = 0.5 * (1 - Math.cos(2 * Math.PI * ((rdB / gs) % 1)));
        const shimOut = sA * eA + sB * eB;
        this.shimRd += 2;
        const sd = this.shimWr - this.shimRd;
        if (sd < 0 || sd > 4096 - gs) {
          this.shimRd = this.shimWr - 2048;
          if (this.shimRd < 0) this.shimRd += 4096;
        }

        // Feedback with shimmer + damping
        for (let l = 0; l < 4; l++) {
          let fb = mx[l] * revFeedback;
          this.fdnLP[l] += damping * (fb - this.fdnLP[l]);
          fb = this.fdnLP[l] + shimOut * shimFeedback;
          fb = Math.tanh(fb * 1.2) * 0.85;
          this.fdnLines[l][this.fdnPos[l]] = diff + fb;
          this.fdnPos[l] = (this.fdnPos[l] + 1) & (this.fdnSize - 1);
        }

        wetL += (taps[0] + taps[2]) * 0.45 * revSend;
        wetR += (taps[1] + taps[3]) * 0.45 * revSend;
      }

      // Mix + soft clip
      let oL = dryL * (1 - this.mix) + wetL * this.mix;
      let oR = dryR * (1 - this.mix) + wetR * this.mix;
      oL = Math.tanh(oL * 1.5) * 0.667;
      oR = Math.tanh(oR * 1.5) * 0.667;

      // DC blocker (removes offset that causes clicks)
      const dcCoeff = 0.997;
      const dcOutL = oL - this.dcL + dcCoeff * this.prevOutL;
      const dcOutR = oR - this.dcR + dcCoeff * this.prevOutR;
      this.dcL = oL; this.dcR = oR;
      this.prevOutL = dcOutL; this.prevOutR = dcOutR;
      oL = dcOutL; oR = dcOutR;

      // Slew limiter — caps sample-to-sample jump to prevent clicks
      const maxSlew = 0.05;
      const dL = oL - (outL[i > 0 ? i - 1 : 0] || 0);
      if (dL > maxSlew) oL = (outL[i > 0 ? i - 1 : 0] || 0) + maxSlew;
      else if (dL < -maxSlew) oL = (outL[i > 0 ? i - 1 : 0] || 0) - maxSlew;
      const dR = oR - (outR[i > 0 ? i - 1 : 0] || 0);
      if (dR > maxSlew) oR = (outR[i > 0 ? i - 1 : 0] || 0) + maxSlew;
      else if (dR < -maxSlew) oR = (outR[i > 0 ? i - 1 : 0] || 0) - maxSlew;

      outL[i] = oL; outR[i] = oR;

      const lvl = Math.abs(oL) > Math.abs(oR) ? Math.abs(oL) : Math.abs(oR);
      if (lvl > this.peakLevel) this.peakLevel = lvl;
    }

    this.meterCounter += N;
    if (this.meterCounter >= 2048) {
      this.meterCounter = 0;
      this.port.postMessage({ peak: this.peakLevel });
      this.peakLevel = 0;
    }
    return true;
  }
}
registerProcessor('dioramatic-processor', DioramaticProcessor);
`;

let ctx, workletNode, sourceNode;

async function initAudio() {
  if (ctx) { await ctx.resume(); return; }
  ctx = new AudioContext({ sampleRate: 44100 });
  const blob = new Blob([processorCode], { type: 'application/javascript' });
  await ctx.audioWorklet.addModule(URL.createObjectURL(blob));
  workletNode = new AudioWorkletNode(ctx, 'dioramatic-processor');
  workletNode.connect(ctx.destination);
  workletNode.port.onmessage = (e) => {
    document.getElementById('meter').style.width = Math.min(100, e.data.peak * 150) + '%';
  };
  document.querySelectorAll('.knob input').forEach(el => {
    el.addEventListener('input', () => {
      const id = el.id.replace('k-', '');
      document.getElementById('v-' + id).textContent = el.value;
      const msg = {}; msg[id] = el.value / 100;
      workletNode.port.postMessage(msg);
    });
    el.dispatchEvent(new Event('input'));
  });
}

function disconnectSource() {
  if (sourceNode) { try{sourceNode.stop();}catch(e){} try{sourceNode.disconnect();}catch(e){} sourceNode=null; }
}
function setActive(id) {
  document.querySelectorAll('.source-section button').forEach(b => b.classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
}
async function playBuffer(buf, label, btnId) {
  await initAudio(); disconnectSource();
  sourceNode = ctx.createBufferSource(); sourceNode.buffer = buf; sourceNode.loop = true;
  sourceNode.connect(workletNode); sourceNode.start();
  setActive(btnId); document.getElementById('status').textContent = label + ' (looping)';
}
async function startBuiltin(url, label) {
  await initAudio();
  document.getElementById('status').textContent = 'Loading ' + label + '...';
  try {
    const resp = await fetch(url); const ab = await resp.arrayBuffer();
    const audioBuf = await ctx.decodeAudioData(ab);
    await playBuffer(audioBuf, label, 'btn-' + label.toLowerCase());
  } catch(e) { document.getElementById('status').textContent = 'Failed: ' + e.message; }
}
async function loadFile(event) {
  const file = event.target.files[0]; if (!file) return;
  await initAudio();
  document.getElementById('file-name').textContent = file.name;
  document.getElementById('status').textContent = 'Loading...';
  const ab = await file.arrayBuffer(); const audioBuf = await ctx.decodeAudioData(ab);
  await playBuffer(audioBuf, file.name, null);
}
async function startMic() {
  await initAudio(); disconnectSource();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  sourceNode = ctx.createMediaStreamSource(stream);
  sourceNode.connect(workletNode);
  sourceNode.stop = () => stream.getTracks().forEach(t=>t.stop());
  setActive('btn-mic'); document.getElementById('status').textContent = 'Mic active';
}
async function startTone() {
  await initAudio(); disconnectSource();
  const o=ctx.createOscillator();o.type='sawtooth';o.frequency.value=220;
  const g=ctx.createGain();g.gain.value=0.15;o.connect(g);g.connect(workletNode);o.start();
  sourceNode=o; setActive('btn-tone'); document.getElementById('status').textContent='Sawtooth 220Hz';
}
async function startChord() {
  await initAudio(); disconnectSource();
  const g=ctx.createGain();g.gain.value=0.08;
  const notes=[261.6,329.6,392,523.3];
  const oscs=notes.map(f=>{const o=ctx.createOscillator();o.type='sine';o.frequency.value=f;o.connect(g);o.start();return o;});
  g.connect(workletNode);
  sourceNode={stop:()=>oscs.forEach(o=>{o.stop();o.disconnect()}),disconnect:()=>g.disconnect()};
  setActive('btn-chord'); document.getElementById('status').textContent='C major chord';
}
function stopAudio() {
  disconnectSource(); setActive(null);
  document.getElementById('status').textContent='Stopped';
  document.getElementById('meter').style.width='0%';
}
</script>
</body>
</html>
